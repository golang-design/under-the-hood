# ---------------------------------------------------------------------------
# WeChat language routing for golang.design/under-the-hood
# ---------------------------------------------------------------------------
# WeChat's link-preview crawler AND its in-app browser send a User-Agent that
# contains "MicroMessenger". Neither runs the site's JavaScript, so the
# client-side auto-routing in partials/zh-cn/lang-redirect.html cannot reach
# them. This server-side rule closes that gap: it forces WeChat to the Chinese
# home so both the unfurl card and the in-app reading experience are Chinese,
# matching the requirement "on WeChat default to Chinese".
#
# It only rewrites the SITE ROOT (the URL people actually paste into WeChat).
# Deep article links unfurl in their own language, which is fine.
#
# STATUS: forward-looking. Today the root is already Chinese, so leave the
# `location` block below COMMENTED until English owns the root; enabling it
# while $wechat_zh_home equals the matched location would create a redirect
# loop. When you flip the default language to English:
#   1. point $wechat_zh_home at the Chinese home (e.g. /under-the-hood/zh-cn/),
#   2. uncomment the location block,
#   3. `nginx -t && systemctl reload nginx`.
# ---------------------------------------------------------------------------

# Put this in the http{} context (e.g. conf.d/), NOT inside server{}.
map $http_user_agent $is_wechat {
    default            0;
    "~*MicroMessenger" 1;
}

# --- inside the existing `server { server_name golang.design; ... }` block: ---
#
#   # Future Chinese home. MUST differ from the location below or it loops.
#   set $wechat_zh_home /under-the-hood/zh-cn/;
#
#   location = /under-the-hood/ {
#       # 302 (not 301): a temporary, UA-conditional route should never be
#       # cached as a permanent redirect by intermediaries.
#       if ($is_wechat) {
#           return 302 $wechat_zh_home;
#       }
#       try_files $uri $uri/ =404;
#   }
