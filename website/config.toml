baseURL = "http://golang.design/under-the-hood"
languageCode = "zh-cn"
title = "Go 语言原本"
theme = "book"

[markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = true
    # noClasses=false emits class-based token markup (.k/.s/.c/...) instead of
    # inlining the "vs" light-theme colors as style="" attributes. Inlined
    # colors cannot be overridden for dark mode without !important on every
    # token; with classes we ship a light Chroma palette as default and a dark
    # palette under html.dark (see assets/_custom.scss). `style` is intentionally
    # omitted because it only matters when noClasses=true.
    noClasses = false
    tabWidth = 4
[markup.goldmark.renderer]
    unsafe= true
# Pass LaTeX math through to the HTML so KaTeX can render it client-side.
# Same delimiters GitHub understands, so the .md stays readable there too.
[markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
        block = [['$$', '$$'], ['\[', '\]']]
        inline = [['$', '$'], ['\(', '\)']]