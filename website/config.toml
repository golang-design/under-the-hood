baseURL = "http://golang.design/under-the-hood"
languageCode = "zh-cn"
title = "Go 语言原本"
theme = "book"

[markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = true
    noClasses = true
    style = "vs"
    tabWidth = 4
[markup.goldmark.renderer]
    unsafe= true
# Pass LaTeX math through to the HTML so KaTeX can render it client-side.
# Same delimiters GitHub understands, so the .md stays readable there too.
[markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
        block = [['$$', '$$'], ['\[', '\]']]
        inline = [['$', '$'], ['\(', '\)']]