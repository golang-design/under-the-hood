<?xml version="1.0" encoding="UTF-8"?>
<!-- Source for the social share card (1200x630). Regenerate the PNG with:
     rsvg-convert -w 1200 -h 630 og-cover.svg \
       -o ../../themes/book/static/og-cover.png
     Colors track the site reading theme: paper #ece8df, ink #232019,
     muted #6b6453, Go blue #00add8. Title is kept centered so WeChat's
     square center-crop still shows it. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#ece8df"/>
  <!-- thin inked frame -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#232019" stroke-opacity="0.14" stroke-width="2"/>
  <!-- Go-blue accent rule, centered -->
  <rect x="560" y="372" width="80" height="6" rx="3" fill="#00add8"/>

  <g text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <!-- kicker -->
    <text x="600" y="176" font-size="30" letter-spacing="8" fill="#6b6453"
          font-weight="600">GO : UNDER THE HOOD</text>
  </g>

  <g text-anchor="middle" font-family="'Songti SC', 'Noto Serif SC', serif">
    <!-- main title -->
    <text x="600" y="320" font-size="112" font-weight="700" fill="#232019">Go 语言原本</text>
    <!-- subtitle -->
    <text x="600" y="426" font-size="40" fill="#3f3a2e">一份不太简短的源码研究</text>
    <!-- author -->
    <text x="600" y="492" font-size="30" fill="#6b6453">欧长坤 · Changkun Ou</text>
  </g>

  <!-- footer URL -->
  <g text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <text x="600" y="566" font-size="28" letter-spacing="2" fill="#6b6453">golang.design/under-the-hood</text>
  </g>
</svg>
