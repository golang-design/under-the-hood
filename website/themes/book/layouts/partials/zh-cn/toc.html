{{ $tocLevels := default (default 6 .Site.Params.BookToC) .Params.BookToC }}
{{ if and $tocLevels .Page.TableOfContents }}
  <aside class="book-toc levels-{{$tocLevels}}">
    <div class="reading-toc-head">{{ i18n "TocHead" }}</div>
    {{ .Page.TableOfContents }}
    <div class="toc-progress"><div class="toc-progress-track"><div id="toc-progress-fill"></div></div><span id="toc-progress-pct">0%</span></div>
  </aside>
{{ end }}
