{{/* The theme switch and language switcher moved to the top bar (see
     partial "zh-cn/topbar"); the sidebar now carries only the search box. */}}
{{ if default true .Site.Params.BookSearch }}
<div class="magic">
<div class="book-search">
  <div class="book-search-field">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="var(--fg-faint)" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input type="text" id="book-search-input" placeholder="{{ i18n "SearchPlaceholder" }}" aria-label="{{ i18n "Search" }}" maxlength="64" />
  </div>
  <div class="book-search-spinner spinner hidden"></div>
  <ul id="book-search-results"></ul>
</div></div>
{{ end }}
