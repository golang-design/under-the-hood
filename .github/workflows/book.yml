name: Book

on:
  push:
    branches: [ main ]
    paths:
      - 'book/**'
      - 'tools/book/**'
      - '.github/workflows/book.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build PDF & EPUB
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pandoc, xelatex and CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex texlive-latex-recommended texlive-latex-extra \
            texlive-lang-chinese texlive-fonts-recommended lmodern \
            fonts-noto-cjk

      - name: Build the book
        working-directory: tools/book
        run: |
          make CJK_MAIN="Noto Sans CJK SC" CJK_MONO="Noto Sans Mono CJK SC"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: under-the-hood-book
          path: |
            tools/book/dist/under-the-hood.pdf
            tools/book/dist/under-the-hood.epub
          if-no-files-found: error
